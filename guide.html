            { id: 'normalization_n', title: 'הצורך בנרמול', content: `<div class="content-area-wide fade-in"><h3>הצורך בנרמול</h3><p><strong>"האם אני שפוי?"</strong></p><p><strong>השורש הנפשי:</strong> צורך זה נובע מהפחד הקמאי מפני אובדן שפיות או "יציאה מהקבוצה" האנושית הנורמטיבית. בזמן משבר, המערכת הנפשית מגיבה בעוצמות שהפונה לא הכיר בעצמו (חרדה משתקת, מחשבות טורדניות, חוסר תפקוד), והוא מפרש את עוצמת התגובה כעדות לכך שהוא "שבור" או "מקולקל" מיסודו.</p><p><strong>איך זה נראה בטקסט?</strong> שאלות של השוואה חברתית: "למה כולם ממשיכים כרגיל ורק אני תקוע?", "זה הגיוני שאני עדיין בוכה בגלל זה?", "אני משתגע, נכון?". הפונה עשוי להביע פחד מהתיוג של "חולה נפש" או להרגיש ניכור מהחלקים המגיבים של עצמו.</p><p><strong>המענה בשיחה:</strong> גשר פסיכו-חינוכי רך. הדינמיקה: המתנדב משמש כ"סוכן של מציאות" שמסביר שהתגובה הכואבת היא למעשה מנגנון אנושי תקין וצפוי תחת הנסיבות. אנו מחברים בין הגידול בסימפטום לבין הגידול בלחץ החיצוני. <strong>דוגמה לתגובה:</strong> "אני שומעת כמה המחשבה ש'משהו אצלך דפוק' מפחידה ומבודדת אותך... אבל חשוב לי להגיד שמה שאת מתארת... זו תגובה מאוד נורמלית ואנושית למצב הבלתי נורמלי שעברת..."</p><p><strong>הרציונל:</strong> הנרמול מוריד את החרדה המשנית (החרדה מהחרדה).</p></div>` },

            { id: 'continuity_n', title: 'הצורך בעקביות ורציפות', content: `<div class="content-area-wide fade-in"><h3>הצורך בעקביות ורציפות</h3><p><strong>"האם תעלם לי?"</strong></p><p><strong>השורש הנפשי:</strong> נובע מחרדת נטישה או מחוויות של חוסר יציבות בחיים. הפונה מחפש דמות יציבה בעולם של כאוס.</p><p><strong>איך זה נראה בטקסט?</strong> "אתה עדיין פה?", "אל תעזוב אותי", "מתי נגמרת המשמרת?", "למה לוקח לך זמן לענות?".</p><p><strong>המענה בשיחה:</strong> שקיפות ונוכחות מוצהרת. הצהרה ברורה על המחויבות שלנו בתוך גבולות השיחה. <strong>דוגמה לתגובה:</strong> "אני כאן איתך, לא הולך לשום מקום עד סוף השיחה שלנו. גם אם לוקח לי רגע לכתוב – אני איתך וקשוב לכל מילה. את/ה יכול/ה לסמוך עליי שאני פה."</p><p><strong>הרציונל:</strong> יצירת רציפות בתוך השיחה בונה בסיס בטוח (Secure Base).</p></div>` }

            { id: 's2', title: 'השהייה בבור', content: `<div class="content-area-wide fade-in"><h3>השלב ה"קדוש" – (10-30 דקות)</h3><p>כאן מתרחש הריפוי האמיתי. זהו רגע של התייחדות עם הכאב. שלב ה"שהייה בבור" הוא לב-ליבה של העשייה בסיוע. זהו השלב שבו המילים הופכות למגע נפשי, ובו מתרחש הנס השקט של הסיוע: היכולת של אדם אחד לשאת את חשיכת רעהו מבלי להסיט את המבט. בארכיטקטורה של השיחה, זהו השטח שבו אנחנו לא "מדברים על" המצוקה אלא מתחילים "להיות בתוך" המצוקה. <h4>1. המהות: הריפוי שבנוכחות - להיות עד</h4><p>במצבי קיצון, הפונה מרגיש שהכאב שלו הוא "רעיל" – שאם הוא יראה אותו לאחרים, הם יברחו או ינסו להשתיק אותו. הפרדוקס: הריפוי לא מגיע משינוי המציאות (הרי לא נוכל להחזיר גלגל לאחור בשיימינג או בטראומה), אלא מהעובדה שמישהו אחר מוכן לשהות איתי בתוך הכאב מבלי להיבהל. המסר הסמוי: "הכאב שלך לא גדול עליי. אני לא מפחד מהחושך שלך". זהו אישור עמוק לאנושי של הפונה. <h4>2. הכלים בתוך הבור: איך "שוהים" נכון?</h4><p>א. מטפורות – השפה של התת-מודע. ב. תיקוף רדיקלי. ג. החצנת הרגש.</p><h4>3. הסיכון: "בריחה לפתרונות"</h4><table class="sahar-table"><thead><tr><th>מה המניע?</th><th>הפעולה</th><th>התוצאה אצל הפונה</th></tr></thead><tbody><tr><td>הצורך של המתנדב</td><td>להציע פתרון טכני מהר מדי</td><td>תחושת דחייה. "הוא רק רוצה שאני אפסיק להתלונן".</td></tr><tr><td>הצורך של הפונה</td><td>שהייה, הקשבה ותיקוף עמוק.</td><td>תחושת נראות. "מישהו סוף סוף מבין... עכשיו אני יכול להתחיל לנשום".</td></tr></tbody></table><h4>4. הדינמיקה: משמעת עצמית בתוך החושך</h4><p>להתבונן בייאוש: כשפונה כותב "אני לא רוצה לחיות יותר", הדחף הוא לכתוב מיד "אל תגיד את זה!". בבור, אנחנו נכתוב: "הייאוש מרגיש כל כך כבד, שנדמה שהמוות הוא המקום היחיד שבו יהיה קצת שקט...". השהיית ה"אור": אנחנו לא מדליקים את האור כי האור בבת אחת יכול לסנוור ולהכאיב. <h4>5. מתי יודעים שאפשר להתחיל לצאת?</h4><p>כשמזהים שהפונה מתחיל להשתמש בשפה קצת יותר מציאותית, או שקצב ההודעות נרגע.</p></div>` },
            { id: 's3', title: 'אומנות המעבר', content: `<div class="content-area-wide fade-in"><h3>אומנות המעבר – "הגשת הסולם"</h3><p>זהו "התפר" העדין ביותר. המעבר מהרגש - הישיבה במעמקי הבור אל האחיזה בשלב הראשון של הסולם. בשלב "הגשת הסולם", המטרה שלנו היא לעזור לפונה לזהות חבלים שכבר קיימים בחיים שלו, או להציע לו חבלים חדשים שיחזיקו אותו עד המפגש הבא עם עזרה. <strong>זיהוי ה"מוזיקה":</strong> שינוי בקצב, סימני נשימה ("אוקיי", "אולי"), הזמנה מצד הפונה ("מה אפשר לעשות?"). הכלל: הסולם הוא הצעה. אם הפונה בועט בו – אנחנו יורדים איתו חזרה לבור לסיבוב נוסף של תיקוף. <h4>סוגי סולמות:</h4><p>1. סולמות של משאבים פנימיים (כוחות עבר). 2. סולמות של משאבים חיצוניים (רשת ביטחון). 3. סולמות של בטיחות (Harm Reduction).</p></div>` },
            { id: 's4', title: 'איסוף וסגירה', content: `<div class="content-area-wide fade-in"><h3>איסוף וסגירה - נחיתה מבוקרת (30-40 דקות)</h3><p>שלב הנחיתה המבוקרת הוא השלב שבו המתנדב עובר מתפקיד של "שותף לכאב" לתפקיד של "מנהל נחיתה". עלינו לוודא שהפונה יוצא מהשיחה כשהוא "אסוף", מקורקע ובעל יכולת תפקוד בסיסית. <strong>1. הגשר: איסוף רסיסי הנפש:</strong> סיכום שמשלב את הקושי יחד עם הכוחות שעלו. המטרה: להחזיר לפונה תחושת רציפות וזהות. <strong>2. הסגירה המוחזקת:</strong> א. התראה (5-7 דקות לפני הסיום). ב. הנמכת עוררות (שיח "ראש"). ג. צידה לדרך (תוכנית ל"מטר הקרוב"). ד. איחול אישי והזמנה לחזור. <h4>מה קורה כשהפונה "מסרב לנחות"?</h4><p>אסטרטגיה: לא פותחים את הבור מחדש. התגובה: "אני שומע שיש עוד הרבה כאב... חשוב לי שתשמור על עצמך הלילה... ואני מזמין אותך לעלות שוב מחר...". זה נקרא תיחום חומל. <h4>צ'ק-ליסט:</h4><p>[ ] התראה. [ ] סיכום. [ ] ירידת עוררות. [ ] דלת פתוחה.</p></div>` }

            { id: 'dna1', title: 'תיקוף ושיקוף:', content: `<div class="content-area-wide fade-in"><h3>תיקוף ושיקוף: המרת הכאב להכרה</h3><p>שיקוף: הפעולה של הדהוד דברי הפונה. לא כתוכי שחוזר על מילים, אלא כמראה המציגה לפונה את דמותו הרגשית. השיקוף מוודא שהפונה מרגיש "שנשמע בדיוק כפי שהתכוון". <strong>דוגמה א':</strong> "שומע מדבריך שהשקט הזה בבית, אחרי שכולם הלכו, הוא זה שמציף את כל המחשבות הקשות." <strong>דוגמה ב':</strong> "נדמה שהתחושה שהפוסט הזה הופץ בכל מקום היא מה שגורם לך להרגיש שאין לך לאן לברוח." תיקוף: הצעד הבא לאחר השיקוף. מתן לגיטימציה רדיקלית לרגש. "זה הגיוני להרגיש ככה בנסיבות האלו". תיקוף ממיס את האשמה והבידוד הנפשי ומאפשר לפונה לקבל את עצמו בתוך המצוקה. <strong>דוגמה א':</strong> "זה כל כך מובן שהמערכת שלך תגיב בחרדה כזו מול טלטלה כל כך גדולה שעברת היום." <strong>דוגמה ב':</strong> "כל אדם שהיה חווה בגידה כזו באמון שלו, היה מרגיש את הזעקה והעלבון שאתה מתאר עכשיו."</p></div>` },
            { id: 'dna2', title: 'החצנת הרגש:', content: `<div class="content-area-wide fade-in"><h3>החצנת הרגש: יצירת "מרחק עבודה"</h3><p>הרציונל: כאשר אדם אומר "אני עצוב", העצב הופך לזהות שלו. שפת הסיוע עוברת לתיאור חווייתי חיצוני: "העצב שאופף אותך עכשיו" או "נדמה שהייאוש תפס מקום מאוד גדול בחדר". ההשלכה: החצנת הרגש מייצרת הפרדה בין ה"עצמי" לבין המצוקה. זה מאפשר לפונה לנשום בתוך הכאב, להתבונן בו כעל "אורח" (אולי לא רצוי), ולהתחיל לנהל אותו במקום שהרגש ינהל את זהותו. <strong>דוגמה א':</strong> "שומעת במילים שלך ייאוש עמוק מאוד, תחושה שפשוט נגמרו לך הכוחות לנסות שוב." <strong>דוגמה ב':</strong> "נדמה שמתחת לכעס הגדול על מה שקרה, מסתתרת גם אכזבה כואבת מאדם שהיה לך יקר."</p></div>` },

            { id: 'dna5', title: 'חובת ה"סייג":', content: `<div class="content-area-wide fade-in"><h3>חובת ה"סייג": אתיקה של אי-ידיעה</h3><p>הרציונל: שימוש בביטויים כמו "אולי", "נדמה ש...", "ייתכן ו...". אנו לעולם לא יודעים באמת מה עובר על הפונה. קביעת עובדה ("אתה מאוד כועס") היא פולשנית ועלולה להיות מוטעית. ההשלכה: הסייג מבטא כבוד לייחודיות של הסבל. הוא מאפשר לפונה לתקן אותנו ("לא כועס, אני פשוט מאוכזב"), ובכך הוא הופך לשותף פעיל בהבנת עצמו ומשיג דיוק רגשי גבוה יותר. <strong>דוגמה א':</strong> "נדמה שהפחד ממה שיגידו מחר בעבודה תופס כרגע את כל המקום בראש..." <strong>דוגמה ב':</strong> "יתכן שהתחושה הזו של המחנק קשורה למפגש שהיה לך קודם עם ההורים."</p></div>` },

                <h2>התמודדות עם מצבים מיוחדים</h2>
                <p>המצבים המיוחדים הללו הם "הקצוות" של עבודת הסיוע. הם דורשים מהמתנדב מעבר מהיר בין חמלה רכה לעמידה איתנה על עקרונות המרחב הבטוח. הדיוק כאן קריטי כדי למנוע בהלה או "להינעל" מול פונה מאתגר.</p>
                <p class="text-xl text-sahar-muted font-medium text-center">בחרו בכותרות המשנה כדי ללמוד על ניהול מצבי קצה.</p>
            </div>
        `,
        subs: [
            { 
                id: 'sp1', 
                title: 'פונה תוקפני', 
                content: `
                    <div class="content-area-wide fade-in">
                        <h3>פונה תוקפני – הכעס ככיסוי לכאב</h3>
                        <p><strong>התפיסה העמוקה:</strong> תוקפנות בשיחה היא כמעט תמיד "התקה" (Displacement). הפונה כועס על החיים, על הממסד, או על מי שפגע בו, והמתנדב הופך למטרה נוחה כי הוא "שם". הכעס הוא מנגנון הגנה – הרבה יותר קל להרגיש כועס וחזק מאשר פגיע וחסר אונים.</p>
                        <p><strong>אסטרטגיית ה"הצטרפות" (Joining):</strong> במקום להתגונן, אנו מצטרפים לתסכול. ניסוח: "נשמע שהתחושה שהמילים שלי לא באמת נוגעות בכאב שלך היא נוראית... שהניסיון שלי לעזור רק מגביר את התסכול שלך מהעולם כרגע."</p>
                        <p><strong>הצבת גבול חומל:</strong> הגבול לא נועד להעניש, אלא לשמור על היכולת שלנו לסייע. מתי? כשמופיע שימוש בקללות אישיות, איומים או הטרדה. איך? "חשוב לי מאוד להמשיך להקשיב לך, אבל השפה הזו מקשה עליי להתרכז במה שעובר עליך. בוא ננסה לחזור למה שגורם לך להרגיש ככה."</p>
                    </div>` 
            },
            { 
                id: 'sp2', 
                title: 'אנונימיות', 
                content: `
                    <div class="content-area-wide fade-in">
                        <h3>אנונימיות – הלוח החלק (The Blank Slate)</h3>
                        <p><strong>התפיסה העמוקה:</strong> האנונימיות היא ה"מנוע" שמאפשר את הקסם ב. היא מייצרת מרחב נקי מהשלכות (No consequences space). הפונה יכול להגיד את הדברים הכי אפלים שלו כי המתנדב הוא לא אדם "אמיתי" בחייו, אלא פונקציה של הקשבה.</p>
                        <p><strong>למה הם שואלים עלינו?</strong> הצורך בשוויוניות: "אני נחשף, למה אתה לא?". הצורך בביטחון: "מי זה שם? אפשר לסמוך עליו?".</p>
                        <p><strong>התגובה המקצועית:</strong> הסטת המוקד מהמידע הטכני לצורך הרגשי. פונה: "מאיפה את/ה? בן/בת כמה?". מתנדב: "מעדיף להישאר כאן כקול שמקשיב לך... אני תוהה אם המחשבה על מי נמצא בצד השני קשורה לצורך להרגיש בטוח יותר בשיחה שלנו?".</p>
                    </div>` 
            },
            { 
                id: 'sp3', 
                title: 'תיאורים גרפיים לא הולמים', 
                content: `
                    <div class="content-area-wide fade-in">
                        <h3>תיאורים גרפיים לא הולמים – הבחנה בין טראומה לפרובוקציה</h3>
                        <p><strong>התפיסה העמוקה:</strong> יש הבדל תהומי בין אדם שמתאר פגיעה מינית מתוך הצפה (Flashback), לבין אדם שמשתמש בתיאור גרפי כדי לייצר גירוי או הטרדה (Acting out).</p>
                        <p><strong>סימני זיהוי להטרדה:</strong> חזרתיות על פרטים פיזיים/מיניים ללא הקשר רגשי, "בדיקה" של תגובת המתנדב, או התעלמות מניסיונות השיקוף הרגשי של המתנדב.</p>
                        <p><strong>הצבת הגבול הטיפולי:</strong> "אני שומע שיש שם הרבה פרטים קשים, אבל התיאור הגרפי הזה מוציא את המיקוד מהרגש שלך ומקשה עליי לסייע לך. בוא נדבר על מה המקרה הזה מעורר בך בלב, ולא על מה שקרה שם פיזית."</p>
                        <p><strong>הרציונל:</strong> הגנה על המתנדב משחיקה ומשניוניות (Secondary Traumatization), ושמירה על השיחה כמרחב סיוע ולא כמרחב פורנוגרפי.</p>
                    </div>` 
            },
            { 
                id: 'sp4', 
                title: 'זיהוי ושיחה עם פונה חייל', 
                content: `
                    <div class="content-area-wide fade-in">
                        <h3>זיהוי ושיחה עם פונה חייל</h3>
                        <p><strong>התפיסה העמוקה:</strong> הצבא הוא "מוסד טוטאלי" (Total Institution). לחייל אין פרטיות, אין חופש תנועה, ויש לו אחריות אדירה. המצוקה שלו היא לעיתים קרובות תחושת מחנק בתוך מערכת שבה הוא "בורג" בלבד.</p>
                        <h4>פרוטוקול עבודה מול חייל:</h4>
                        <table class="sahar-table">
                            <thead><tr><th>היבט</th><th>ביטוי בשיחה</th><th>אסטרטגיה סהרית</th></tr></thead>
                            <tbody>
                                <tr><td>חוסר שליטה</td><td>"המפקד לא נותן לי", "סוגר שבת".</td><td>תיקוף תחושת הניכור והצורך באוטונומיה.</td></tr>
                                <tr><td>אמצעי קצה</td><td>נגישות לנשק (גם בבית).</td><td>חובת בירור: "חשוב לי לדעת, איפה הנשק שלך נמצא כרגע?".</td></tr>
                                <tr><td>קונפליקט</td><td>פחד לפנות לקב"ן (פגיעה בקריירה/פרופיל).</td><td>נרמול הפנייה לעזרה והפרדת ה\"חייל\" מה\"אדם\".</td></tr>
                            </tbody>
                        </table>
                        <p><strong>דגש על נשק:</strong> אם חייל מעלה תכנים אובדניים, השאלה על הנשק היא לא "חדירה לפרטיות" אלא הצלת חיים. יש לוודא שהנשק רחוק (בנשקייה, אצל המפקד, או בפריקה בבית).</p>
                    </div>` 
            }
        ]
    }
];

let currentSectionId = 'intro';
let currentSubId = null;
let currentItemId = null;

function renderSidebar() {
    const container = document.getElementById('navContainer');
    container.innerHTML = '';
    sectionsData.forEach(section => {
        const isSectionActive = currentSectionId === section.id;
        const sectionBtn = document.createElement('button');
        sectionBtn.className = `nav-btn w-full text-right p-4 transition-all hover:bg-sahar-primaryLight flex items-center justify-between rounded-xl md:rounded-none group ${isSectionActive ? 'active' : ''}`;
        sectionBtn.innerHTML = `
            <div class="flex items-center gap-3">
                <span class="text-2xl">${section.icon}</span>
                <span class="font-bold text-sm leading-tight text-sahar-text">${section.title}</span>
            </div>
            ${section.subs ? `<span class="text-[10px] transition-transform ${isSectionActive ? 'rotate-180' : ''}">▼</span>` : ''}
        `;
        sectionBtn.onclick = () => { 
            currentSectionId = section.id; 
            currentSubId = null; 
            currentItemId = null;
            renderSidebar(); 
            renderMainContent(); 
        };
        container.appendChild(sectionBtn);

        if (isSectionActive && section.subs) {
            const subContainer = document.createElement('div');
            subContainer.className = "bg-gray-50/50 py-1 mb-2 border-r-2 border-sahar-primary/20 mx-2 fade-in";
            section.subs.forEach(sub => {
                const isSubActive = currentSubId === sub.id;
                const subBtn = document.createElement('button');
                subBtn.className = `sub-nav-btn ${isSubActive ? 'active' : ''}`;
                subBtn.innerText = sub.title;
                subBtn.onclick = (e) => { 
                    e.stopPropagation(); 
                    currentSubId = sub.id; 
                    currentItemId = null;
                    renderSidebar(); 
                    renderMainContent(); 
                };
                subContainer.appendChild(subBtn);

                if (isSubActive && sub.items) {
                    const itemsContainer = document.createElement('div');
                    itemsContainer.className = "bg-white/50 py-1";
                    sub.items.forEach(item => {
                        const itemBtn = document.createElement('button');
                        itemBtn.className = `sub-sub-nav-btn ${currentItemId === item.id ? 'active' : ''}`;
                        itemBtn.innerText = item.title;
                        itemBtn.onclick = (e) => {
                            e.stopPropagation();
                            currentItemId = item.id;
                            renderSidebar();
                            renderMainContent();
                        };
                        itemsContainer.appendChild(itemBtn);
                    });
                    subContainer.appendChild(itemsContainer);
                }
            });
            container.appendChild(subContainer);
        }
    });
}

function renderMainContent() {
    const main = document.getElementById('mainContent');
    const section = sectionsData.find(s => s.id === currentSectionId);
    
    if (section.content && !currentSubId) {
        main.innerHTML = `<div class="fade-in">${section.content}</div>`;
        return;
    }

    if (!currentSubId) {
        main.innerHTML = `<div class="fade-in text-right"><h2 class="text-5xl font-black text-sahar-primary mb-8 flex items-center gap-6"><span class="bg-sahar-primaryLight p-4 rounded-3xl shadow-sm">${section.icon}</span>${section.title}</h2><div class="grid grid-cols-1 md:grid-cols-2 gap-6 text-right">${section.subs.map(sub => `<button onclick="goToSub('${sub.id}')" class="bg-white p-8 rounded-3xl border border-sahar-border shadow-sm hover:shadow-xl transition-all text-right group"><h4 class="font-black text-sahar-primary text-xl mb-2 group-hover:underline decoration-4 text-right">${sub.title}</h4></button>`).join('')}</div></div>`;
    } else {
        const sub = section.subs.find(s => s.id === currentSubId);
        
        if (sub.items && !currentItemId) {
            main.innerHTML = `<div class="fade-in text-right"><button onclick="backToOverview()" class="text-sahar-primary font-bold mb-8 hover:underline flex items-center gap-2 transition-all"><span>→</span> חזרה ל${section.title}</button><div class="content-area-wide bg-white p-12 md:p-20 rounded-[4rem] shadow-sm border border-sahar-border">${sub.content}</div></div>`;
        } else {
            const displayObj = currentItemId ? sub.items.find(i => i.id === currentItemId) : sub;
            const backAction = currentItemId ? `goToSub('${sub.id}')` : `backToOverview()`;
            const backLabel = currentItemId ? `חזרה ל${sub.title}` : `חזרה ל${section.title}`;
            
            main.innerHTML = `<div class="fade-in text-right"><button onclick="${backAction}" class="text-sahar-primary font-bold mb-8 hover:underline flex items-center gap-2 transition-all"><span>→</span> ${backLabel}</button><div class="content-area-wide bg-white p-12 md:p-20 rounded-[4rem] shadow-sm border border-sahar-border">${displayObj.content}</div></div>`;
        }
    }
}

function init() { renderSidebar(); renderMainContent(); }
window.goToSub = (id) => { currentSubId = id; currentItemId = null; renderSidebar(); renderMainContent(); };
window.backToOverview = () => { currentSubId = null; currentItemId = null; renderSidebar(); renderMainContent(); };
document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
