<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>סימולטור אימון - הזנקה</title>
    <script>
        if (sessionStorage.getItem('authenticated') !== 'true') {
            window.location.href = "index.html";
        }
    </script>
    <style>
        :root { --primary: #3b4d36; --accent: #f39c12; --bg: #fcfbf9; }
        body { font-family: system-ui, sans-serif; background: var(--bg); margin: 0; padding: 20px; display: flex; flex-direction: column; min-height: 100vh; }
        .nav-bar { background: #ffffff; padding: 12px 20px; border-bottom: 2px solid #e5e7eb; display: flex; justify-content: flex-end; width: 100%; position: fixed; top: 0; right: 0; z-index: 100; box-sizing: border-box;}
        .back-link { text-decoration: none; color: var(--primary); font-weight: bold; font-size: 16px; border: 2px solid var(--primary); padding: 8px 16px; border-radius: 12px; background: #f1f5f0; }
        .container { max-width: 750px; width: 100%; background: white; padding: 45px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); border-top: 10px solid var(--accent); text-align: center; margin: auto; margin-top: 100px; }
        h1 { color: var(--primary); margin-bottom: 10px; font-size: 32px; }
        .instructions { background: #f1f5f0; padding: 20px; border-radius: 12px; margin: 25px 0; text-align: right; border-right: 6px solid var(--primary); line-height: 1.8; }
        .btn-group { display: flex; flex-direction: column; gap: 15px; margin-top: 30px; }
        button, .btn-open { padding: 22px; border: none; border-radius: 10px; font-size: 24px; font-weight: bold; cursor: pointer; transition: 0.3s; width: 100%; text-align: center; }
        .btn-copy { background: var(--primary); color: white; }
        .btn-open { background: var(--accent); color: white; text-decoration: none; display: none; }
        button:hover { transform: translateY(-3px); opacity: 0.95; }
        #promptStorage { display: none; }
    </style>
</head>
<body>

<div class="nav-bar"><a href="index.html" class="back-link">🏠 חזרה למרכז</a></div>

<div class="container">
    <h1>🚀 סימולטור אימון</h1>
    <div class="instructions">
        1. לחץ על הכפתור הירוק להעתקת הפרומפט.<br>
        2. לחץ על הכפתור הכתום שיפתח את Gemini.<br>
        3. ב-Gemini: בצע <b>הדבק (Ctrl+V)</b> ושלח.
    </div>
    <div class="btn-group">
        <button id="copyBtn" class="btn-copy" onclick="doSimulationCopy()">1. העתק חבילת סימולציה</button>
        <a id="openBtn" class="btn-open" href="https://gemini.google.com/" target="_blank">2. פתח Gemini והתחל</a>
    </div>
    <div id="status" style="display:none; color: #1e8e3e; font-weight: bold; margin-top: 15px;">✅ הועתק! המשך לכפתור הכתום.</div>
</div>

<pre id="promptStorage">
[כאן תדביק את הפרומפט המקורי הארוך של הסימולטור כפי ששלחת לי קודם]
</pre>

<script>
    function doSimulationCopy() {
        const text = document.getElementById('promptStorage').innerText;
        
        // העתקה ללוח
        navigator.clipboard.writeText(text).then(() => {
            // חשיפת הכפתור הכתום
            document.getElementById('openBtn').style.display = 'block';
            document.getElementById('status').style.display = 'block';
            document.getElementById('copyBtn').innerText = "✅ הועתק בהצלחה";
        }).catch(err => {
            alert("שגיאה בהעתקה. נסה שוב.");
        });
    }
</script>
</body>
</html>
