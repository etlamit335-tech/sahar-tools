<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <script src="data.js"></script>
</head>
<body class="h-screen flex">
    <nav id="sidebar" class="hidden w-80 bg-white shadow-2xl flex flex-col z-30 border-l border-gray-200 overflow-hidden">
        <div class="p-6 border-b border-gray-200 flex flex-col gap-4">
            <h1 class="text-xl font-black text-[#3b4d36]">השפה הסהרית</h1>
            <button onclick="location.reload()" class="w-full py-2 bg-[#3b4d36] text-white rounded-lg font-bold text-sm">🏠 חזרה לדף הבית</button>
        </div>
        <div class="flex-1 overflow-y-auto py-4 px-2 space-y-1" id="navContainer"></div>
    </nav>
    <main class="flex-1 overflow-y-auto relative bg-[#fcfbf9]" id="mainContent"></main>
    <script>
        function renderLanding() {
            document.getElementById('sidebar').classList.add('hidden');
            document.getElementById('mainContent').innerHTML = `
                <div class="min-h-screen flex flex-col items-center justify-center p-10 text-center fade-in">
                    <div class="mb-12"><span class="text-9xl text-[#3b4d36] block mb-6">☾</span><h1 class="text-6xl font-black text-gray-900">מרכז הלמידה של סה"ר</h1></div>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-10 w-full max-w-7xl">
                        <a href="simulator.html" class="big-card bg-white p-14 rounded-[4rem] shadow-sm"><span class="text-8xl mb-8">🎮</span><h3 class="text-3xl font-black text-[#3b4d36]">סימולטור</h3></a>
                        <a href="analyzer.html" class="big-card bg-white p-14 rounded-[4rem] shadow-sm"><span class="text-8xl mb-8">🔍</span><h3 class="text-3xl font-black text-[#3b4d36]">ניתוח שיחה</h3></a>
                        <button onclick="startLearning()" class="big-card bg-[#3b4d36] p-14 rounded-[4rem] text-white"><span class="text-8xl mb-8">📖</span><h3 class="text-3xl font-black">השפה הסהרית</h3></button>
                    </div>
                </div>`;
        }
        function startLearning() {
            document.getElementById('sidebar').classList.remove('hidden');
            renderSidebar();
            showSection('intro');
        }
        function renderSidebar() {
            const container = document.getElementById('navContainer');
            container.innerHTML = sectionsData.map(s => `<button onclick="showSection('${s.id}')" class="nav-btn w-full text-right p-4 font-bold">${s.icon} ${s.title}</button>`).join('');
        }
        function showSection(id) {
            const s = sectionsData.find(x => x.id === id);
            document.getElementById('mainContent').innerHTML = s.content;
        }
        document.addEventListener('DOMContentLoaded', renderLanding);
    </script>
</body>
</html>
