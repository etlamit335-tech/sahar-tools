            { id: 's1', title: 'פתיחה (0-10 דק)', content: `<div class="p-4"><h3>בניית העריסה והחוזה</h3><p>ביסוס אמון, הבנת המציאות של הפונה ואבחון הצורך הסמוי.</p></div>` },
            { id: 's2', title: 'שהייה בבור (10-30 דק)', content: `<div class="p-4"><h3>השלב ה"קדוש"</h3><p>התייחדות עם הכאב. לא רצים לפתרונות, פשוט נמצאים שם איתו בחשיכה.</p></div>` },
            { id: 's3', title: 'סגירה (30-40 דק)', content: `<div class="p-4"><h3>נחיתה מבוקרת</h3><p>איסוף רסיסי הנפש, סיכום הכוחות והשארת דלת פתוחה למחר.</p></div>` }
        ]
    },
    {
        id: 'dna',
        title: 'DNA השפה',
        icon: '🧬',
        content: `<div class="content-area-wide fade-in"><h2>חוקי התחביר של הרגש</h2><p>אלו הכלים שהופכים שיחה סתמית לשיחה סהרית.</p></div>`,
        subs: [
            { id: 'dna1', title: 'ניקוי ה"אני"', content: `<div class="p-4"><h3>המתנדב כמראה נקייה</h3><p>ויתור על דעות, עצות ושיתוף אישי. המרחב כולו שייך לפונה.</p></div>` },
            { id: 'dna2', title: 'חובת הסייג', content: `<div class="p-4"><h3>אתיקה של אי-ידיעה</h3><p>שימוש במילים "אולי", "נדמה ש...". הפונה הוא המומחה היחיד לכאב שלו.</p></div>` },
            { id: 'dna3', title: 'ההנהון הדיגיטלי (...)', content: `<div class="p-4"><h3>דופק השיחה הכתובה</h3><p>השימוש ב-3 נקודות מאט את הקצב ויוצר תחושה של נשימה ונוכחות חמה.</p></div>` }
        ]
    }
];

let currentSectionId = 'intro';
let currentSubId = null;
let currentItemId = null;

function enterLearningMode() {
    document.getElementById('landingPage').classList.add('hidden');
    document.getElementById('learningMode').classList.remove('hidden');
    renderSidebar();
    showContent('intro');
}

function exitLearningMode() {
    document.getElementById('learningMode').classList.add('hidden');
    document.getElementById('landingPage').classList.remove('hidden');
}

function renderSidebar() {
    const container = document.getElementById('navContainer');
    container.innerHTML = '';
    sectionsData.forEach(section => {
        const isActive = currentSectionId === section.id;
        const btn = document.createElement('button');
        btn.className = `nav-btn w-full text-right p-4 transition-all flex items-center justify-between group ${isActive ? 'active' : ''}`;
        btn.innerHTML = `
            <div class="flex items-center gap-3">
                <span class="text-xl">${section.icon}</span>
                <span class="font-bold text-sm leading-tight">${section.title}</span>
            </div>
            ${section.subs ? `<span class="text-[10px] transition-transform ${isActive ? 'rotate-180' : ''}">▼</span>` : ''}
        `;
        btn.onclick = () => { 
            currentSectionId = section.id; 
            currentSubId = null; 
            currentItemId = null;
            renderSidebar(); 
            showContent(section.id); 
        };
        container.appendChild(btn);

        if (isActive && section.subs) {
            const subBox = document.createElement('div');
            subBox.className = "bg-gray-50/50 py-1 mx-2 border-r-2 border-[#3b4d36]/20 fade-in";
            section.subs.forEach(sub => {
                const isSubActive = currentSubId === sub.id;
                const subBtn = document.createElement('button');
                subBtn.className = `sub-nav-btn ${isSubActive ? 'active' : ''}`;
                subBtn.innerText = sub.title;
                subBtn.onclick = (e) => { 
                    e.stopPropagation(); 
                    currentSubId = sub.id; 
                    currentItemId = null;
                    renderSidebar(); 
                    showContent(section.id, sub.id); 
                };
                subBox.appendChild(subBtn);

                if (isSubActive && sub.items) {
                    sub.items.forEach(item => {
                        const itemBtn = document.createElement('button');
                        itemBtn.className = `sub-sub-nav-btn ${currentItemId === item.id ? 'active' : ''}`;
                        itemBtn.innerText = "• " + item.title;
                        itemBtn.onclick = (e) => {
                            e.stopPropagation();
                            currentItemId = item.id;
                            renderSidebar();
                            showContent(section.id, sub.id, item.id);
                        };
                        subBox.appendChild(itemBtn);
                    });
                }
            });
            container.appendChild(subBox);
        }
    });
}

function showContent(secId, subId = null, itemId = null) {
    const sec = sectionsData.find(s => s.id === secId);
    let html = sec.content;
    if (subId) {
        const sub = sec.subs.find(s => s.id === subId);
        html = itemId ? sub.items.find(i => i.id === itemId).content : sub.content;
    }
    document.getElementById('mainContent').innerHTML = `<div class="fade-in">${html}</div>`;
}

// התחלה בנחיתה
window.onload = () => {
    document.getElementById('landingPage').classList.remove('hidden');
};
</script>
</body>
</html>
