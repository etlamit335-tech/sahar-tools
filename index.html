<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>מרכז הלמידה של סה"ר</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <script src="data.js"></script>
</head>
<body class="h-screen flex overflow-hidden">

<nav id="sidebar" class="hidden w-80 bg-white shadow-2xl flex flex-col z-30 border-l border-gray-200 overflow-hidden">
    <div class="p-6 border-b border-gray-200 flex flex-col gap-4">
        <div class="flex items-center gap-4 text-[#3b4d36]">
            <span class="text-4xl">☾</span>
            <h1 class="text-xl font-black text-gray-900 leading-tight">השפה הסהרית</h1>
        </div>
        <button onclick="location.reload()" class="w-full py-2 bg-[#3b4d36] text-white rounded-lg font-bold text-sm">🏠 חזרה לדף הבית</button>
    </div>
    <div class="flex-1 overflow-y-auto py-4 hide-scroll px-2 space-y-1" id="navContainer"></div>
</nav>

<main class="flex-1 overflow-y-auto relative bg-[#fcfbf9]" id="mainContent"></main>

<script>
let currentSectionId = 'intro';
let currentSubId = null;

function renderLanding() {
    document.getElementById('sidebar').classList.add('hidden');
    document.getElementById('mainContent').innerHTML = `
        <div class="min-h-screen flex flex-col items-center justify-center p-10 text-center fade-in">
            <div class="mb-12">
                <span class="text-9xl text-[#3b4d36] block mb-6">☾</span>
                <h1 class="text-5xl md:text-7xl font-black text-gray-900">מרכז הלמידה של סה"ר</h1>
                <p class="text-2xl text-gray-500 mt-4 font-bold italic text-right">"להיות איתו בבור..."</p>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-10 w-full max-w-7xl">
                <a href="simulator.html" class="big-card bg-white p-14 rounded-[4rem] shadow-sm"><span class="text-8xl mb-8">🎮</span><h3 class="text-3xl font-black text-[#3b4d36]">סימולטור</h3></a>
                <a href="analyzer.html" class="big-card bg-white p-14 rounded-[4rem] shadow-sm"><span class="text-8xl mb-8">🔍</span><h3 class="text-3xl font-black text-[#3b4d36]">ניתוח שיחה</h3></a>
                <button onclick="startLearning()" class="big-card bg-[#3b4d36] p-14 rounded-[4rem] text-white shadow-lg"><span class="text-8xl mb-8">📖</span><h3 class="text-3xl font-black">השפה הסהרית</h3></button>
            </div>
        </div>`;
}

function startLearning() {
    document.getElementById('sidebar').classList.remove('hidden');
    renderSidebar();
    showContent('intro');
}

function renderSidebar() {
    const container = document.getElementById('navContainer');
    container.innerHTML = '';
    sectionsData.forEach(section => {
        const isActive = currentSectionId === section.id;
        const btn = document.createElement('button');
        btn.className = `nav-btn w-full text-right p-4 transition-all flex items-center justify-between group ${isActive ? 'active' : ''}`;
        btn.innerHTML = `<div class="flex items-center gap-3"><span>${section.icon}</span><span class="font-bold text-sm">${section.title}</span></div>`;
        btn.onclick = () => { currentSectionId = section.id; currentSubId = null; renderSidebar(); showContent(section.id); };
        container.appendChild(btn);

        if (isActive && section.subs) {
            const subBox = document.createElement('div');
            subBox.className = "bg-gray-50/50 py-1 mx-2 border-r-2 border-[#3b4d36]/20";
            section.subs.forEach(sub => {
                const subBtn = document.createElement('button');
                subBtn.className = `sub-nav-btn ${currentSubId === sub.id ? 'active' : ''}`;
                subBtn.innerText = sub.title;
                subBtn.onclick = (e) => { e.stopPropagation(); currentSubId = sub.id; renderSidebar(); showContent(section.id, sub.id); };
                subBox.appendChild(subBtn);
            });
            container.appendChild(subBox);
        }
    });
}

function showContent(sectionId, subId = null) {
    const section = sectionsData.find(s => s.id === sectionId);
    const content = subId ? section.subs.find(s => s.id === subId).content : section.content;
    document.getElementById('mainContent').innerHTML = `<div class="p-6 md:p-14">${content}</div>`;
}

document.addEventListener('DOMContentLoaded', renderLanding);
</script>
</body>
</html>
