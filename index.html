<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מרכז הלמידה</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #fcfbf9; font-family: system-ui, sans-serif; }
        .big-card { 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            border: 2px solid #e5e7eb; 
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .big-card:hover { 
            transform: translateY(-10px); 
            border-color: #3b4d36; 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15); 
        }
    </style>
    <script>
        // הגנת סיסמה לכניסה למרכז הלמידה
        const pass = prompt("דף פנימי מוגן. אנא הזן סיסמה:");
        if (pass !== "3357") { // בחר כאן את הסיסמה שלך
            document.documentElement.innerHTML = "<body style='display:flex; justify-content:center; align-items:center; height:100vh; font-family:sans-serif;'><h1>גישה חסומה.</h1></body>";
            window.stop();
        }
    </script>
<head>
    <meta charset="UTF-8">
    <script>
        // בדיקה אם המשתמש כבר הזדהה בסשן הנוכחי
        if (sessionStorage.getItem('authenticated') !== 'true') {
            const pass = prompt("דף פנימי מוגן. אנא הזן סיסמה:");
            if (pass === "3357") {
                // שמירת האישור בזיכרון הדפדפן ללשונית הזו
                sessionStorage.setItem('authenticated', 'true');
            } else {
                document.documentElement.innerHTML = "<body style='display:flex; justify-content:center; align-items:center; height:100vh; font-family:sans-serif; background:#fcfbf9;'><h1>גישה חסומה.</h1></body>";
                window.stop();
            }
        }
    </script>
</head>
    <body class="min-h-screen flex flex-col items-center justify-center p-10 text-center">
    <div class="mb-12">
        <h1 class="text-5xl md:text-7xl font-black text-gray-900 leading-tight">ברוכים הבאים למרכז הלמידה</h1>
        <p class="text-2xl text-gray-500 mt-4 font-bold italic">סיוע לפונים במצוקה</p>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-10 w-full max-w-7xl">
        <a href="simulator.html" class="big-card bg-white p-14 rounded-[4rem] shadow-sm">
            <span class="text-8xl mb-8">🎮</span>
            <h3 class="text-3xl font-black text-[#3b4d36] mb-3">סימולטור</h3>
            <p class="text-gray-400 font-medium italic">אימון אישי מול פונה AI</p>
        </a>
        <a href="analyzer.html" class="big-card bg-white p-14 rounded-[4rem] shadow-sm">
            <span class="text-8xl mb-8">🔍</span>
            <h3 class="text-3xl font-black text-[#3b4d36] mb-3">ניתוח שיחה</h3>
            <p class="text-gray-400 font-medium italic">משוב פדגוגי מלא</p>
        </a>
        <a href="guide.html" class="big-card bg-[#3b4d36] p-14 rounded-[4rem] text-white shadow-lg">
            <span class="text-8xl mb-8">📖</span>
            <h3 class="text-3xl font-black text-white mb-3">שפת הסיוע</h3>
            <p class="opacity-80 font-medium italic">המדריך המקצועי המלא</p>
        </a>
    </div>
</body>
</html>
